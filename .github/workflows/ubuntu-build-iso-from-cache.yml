name: Ubuntu Build ISO from Cache

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [xfce]
        init: [sysvinit]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev \
            squashfs-tools jq cpio
          sudo apt-get install -y busybox-static || true

      - name: Create lfs user
        run: |
          if ! id "lfs" &>/dev/null; then
            sudo useradd -m -s /bin/bash lfs
          fi

      - name: Get latest release cache URL
        id: get_cache
        run: |
          RELEASE_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          ASSET_URL=$(curl -s "$RELEASE_URL" | jq -r '.assets[] | select(.name=="rootfs.tar.xz") | .browser_download_url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ No rootfs.tar.xz found"
            exit 1
          fi
          echo "cache_url=$ASSET_URL" >> $GITHUB_OUTPUT

      - name: Download and extract cache
        run: |
          sudo mkdir -p /tmp/lfs-build/image
          cd /tmp/lfs-build
          sudo wget -q --show-progress "${{ steps.get_cache.outputs.cache_url }}" -O rootfs.tar.xz
          sudo tar -xJf rootfs.tar.xz -C image/
          sudo chown -R lfs:lfs image/
          ls -lh image/

      - name: Copy repository to /tmp/lfs-builder
        run: |
          sudo mkdir -p /tmp/lfs-builder
          sudo cp -a . /tmp/lfs-builder/
          sudo chown -R lfs:lfs /tmp/lfs-builder

      - name: Grant passwordless sudo to lfs
        run: |
          sudo bash -c 'echo "lfs ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/lfs'
          sudo chmod 440 /etc/sudoers.d/lfs

      - name: Run final stages (with debug)
        id: build_iso
        run: |
          LFS_PATH="/tmp/lfs-build/image"
          cd /tmp/lfs-builder
          set -x
          sudo -u lfs LFS="$LFS_PATH" ./final/12-create-initramfs.sh
          sudo -u lfs LFS="$LFS_PATH" ./final/13-create-bootloader.sh
          sudo -u lfs LFS="$LFS_PATH" ./final/14-create-installer.sh
          sudo -u lfs LFS="$LFS_PATH" ./final/15-create-live-system.sh

      - name: Upload ISO to release
        if: success() && steps.build_iso.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.3.0-iso
          name: LFS Xfce ISO
          files: /tmp/lfs-build/lfs-installer.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ISO presence
        if: always()
        run: |
          if [ -f /tmp/lfs-build/lfs-installer.iso ]; then
            echo "✅ ISO built successfully"
          else
            echo "❌ ISO not found"
            exit 1
          fi