name: Squash PR Commits

on:
  issue_comment:
    types: [created]

permissions:
  contents: write            # needed to push the squashed commit

jobs:
  squash:
    if: |
      github.event.issue.pull_request && 
      startsWith(github.event.comment.body, '/squash')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh auth status

      # ──────────────────────────────────────────────
      # Safe: use the issue number directly from the event payload
      # (no injection possible from comment.body)
      # ──────────────────────────────────────────────
      - name: Squash PR commits
        run: |
          chmod +x squash-pr-commits.sh
          ./squash-pr-commits.sh ${{ github.event.issue.number }} \
            "PR #${{ github.event.issue.number }} (squashed by comment)"