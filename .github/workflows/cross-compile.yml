name: Cross-Compile ARM64

on:
  push:
    branches: [ main ]

jobs:
  cross:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bison flex gawk texinfo \
            wget curl git python3 python3-pip xorriso isolinux \
            mtools dosfstools parted rsync bc cpio kmod \
            libssl-dev libelf-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-user-static

      - name: Create lfs user
        run: |
          if ! id lfs &>/dev/null; then
            sudo useradd -m -s /bin/bash lfs
          fi
          sudo -u lfs touch /home/lfs/.bashrc

      - name: Prepare lfs build directory
        run: |
          sudo mkdir -p /tmp/lfs-build
          sudo cp -a $GITHUB_WORKSPACE/. /tmp/lfs-build/
          sudo chown -R lfs:lfs /tmp/lfs-build

      - name: Build ARM64 (minimal)
        run: |
          cd /tmp/lfs-build
          sudo -u lfs python3 builder.py --profile arm64 --no-live --output ./build-arm64

      - name: Verify output image
        run: |
          if [ -f /tmp/lfs-build/build-arm64/lfs-arm64.img ]; then
            echo "Found lfs-arm64.img"
          elif [ -f /tmp/lfs-build/build-arm64/lfs-installer.iso ]; then
            echo "Found lfs-installer.iso"
          else
            echo "No image file found"
            exit 1
          fi