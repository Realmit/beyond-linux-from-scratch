name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read   # Required for checking out code and uploading coverage

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest coverage pytest-cov pytest-timeout requests-mock pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        run: |
          # Check for syntax errors and undefined names (exit with error code)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          # Full linting report (exit-zero means ignore failure)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true
      - name: Test with pytest
        run: |
          pytest tests/ --cov=builder --cov-report=term --cov-report=xml -v
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}