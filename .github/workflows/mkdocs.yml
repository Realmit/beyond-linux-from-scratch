site_name: Beyond Linux From Scratch
site_description: "LFS/BLFS Builder – Custom Linux Distribution Builder"
repo_url: https://github.com/landrevillejf/beyond-linux-from-scratch

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - Profiles: profiles.md
  - Configuration: configuration.md
  - LPM Package Manager: lpm.md
  - Java Dev Profile: java-dev.md
  - Advanced Usage: ADVANCED.md
  - Changelog: CHANGELOG.md
  - Contributing: CONTRIBUTING.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true