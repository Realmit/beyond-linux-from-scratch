name: Build Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [kde, gnome, full]
        init: [systemd]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev
          # Vérification
          command -v texinfo || echo "texinfo missing"
          command -v makeinfo || echo "makeinfo missing"   # souvent fourni par texinfo

      - name: Show disk space
        run: df -h

      - name: Cache LFS sources
        uses: actions/cache@v4
        with:
          path: /tmp/lfs-build/sources
          key: lfs-sources-${{ matrix.profile }}-${{ hashFiles('packages/sources.list') }}
          restore-keys: lfs-sources-

      - name: Debug texinfo
        run: |
          echo "PATH=$PATH"
          which texinfo || echo "texinfo not found"
          which makeinfo || echo "makeinfo not found"
          texinfo --version || echo "texinfo command failed"

      - name: Build profile (without sudo if possible)
        id: build
        continue-on-error: true   # Pour capturer le log même en échec
        run: |
          mkdir -p /tmp/lfs-build
          # Essayer sans sudo
          python3 builder.py \
            --profile ${{ matrix.profile }} \
            --init ${{ matrix.init }} \
            --output /tmp/lfs-build

      - name: Show host-check log if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "=== host-check.log ==="
          cat /tmp/lfs-build/logs/host-check.log || echo "Log not found"
          echo "======================="
          exit 1   # Marquer l'échec

      - name: Upload rootfs
        if: steps.build.outcome == 'success'
        run: |
          cd /tmp/lfs-build/image
          tar -cJf /tmp/rootfs.tar.xz .

      - name: Upload to Release
        if: steps.build.outcome == 'success'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/rootfs.tar.xz
          asset_name: lfs-rootfs-${{ matrix.profile }}-${{ matrix.init }}-${{ matrix.arch }}.tar.xz
          tag: v4.3.0-cache
          overwrite: true