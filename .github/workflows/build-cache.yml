name: Build Cache

on:
  schedule:
    - cron: '0 0 * * 0'   # weekly on Sunday
  workflow_dispatch:      # manual trigger

permissions:
  contents: write         # Required to upload release assets

jobs:
  build-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [kde, gnome, full]
        init: [systemd]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio \
            libssl-dev libelf-dev

      - name: Install Python dependencies (if any)
        run: |
          if [ -f requirements.txt ]; then
            pip3 install -r requirements.txt
          fi

      - name: Cache LFS sources (optional)
        uses: actions/cache@v4
        with:
          path: /tmp/lfs-build/sources
          key: lfs-sources-${{ matrix.profile }}-${{ hashFiles('packages/sources.list') }}
          restore-keys: |
            lfs-sources-

      - name: Build profile
        run: |
          # Create output directory
          mkdir -p /tmp/lfs-build
          # Run builder (use sudo if needed)
          sudo python3 builder.py \
            --profile ${{ matrix.profile }} \
            --init ${{ matrix.init }} \
            --output /tmp/lfs-build
          # Compress the root filesystem
          cd /tmp/lfs-build/image
          tar -cJf /tmp/rootfs.tar.xz .

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/rootfs.tar.xz
          asset_name: lfs-rootfs-${{ matrix.profile }}-${{ matrix.init }}-${{ matrix.arch }}.tar.xz
          tag: v4.3.0-cache
          overwrite: true