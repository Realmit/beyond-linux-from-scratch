name: Build Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [kde, gnome, full]
        init: [systemd]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev
          command -v makeinfo || { echo "makeinfo not found"; exit 1; }

      - name: Show disk space
        run: df -h

      - name: Cache LFS sources
        uses: actions/cache@v4
        with:
          path: /tmp/lfs-build/sources
          key: lfs-sources-${{ matrix.profile }}-${{ hashFiles('packages/sources.list') }}
          restore-keys: lfs-sources-

      # Patcher les scripts pour ignorer texinfo/makeinfo (CI)
      - name: Patch host-check.sh to skip texinfo/makeinfo checks in CI
        run: |
          sed -i '/texinfo/d' host/01-check-host.sh
          sed -i '/makeinfo/d' host/01-check-host.sh

      # S'assurer que host/04-build-toolchain.sh se relance en tant que lfs si exécuté en root
      # (ajouter le bloc si nécessaire)
      - name: Ensure toolchain script switches to lfs user
        run: |
          if ! grep -q "exec sudo -E -u lfs" host/04-build-toolchain.sh; then
            sed -i '1i if [ "$(whoami)" = "root" ] && id "lfs" &>/dev/null; then\n    echo "Running as root, switching to lfs user..."\n    exec sudo -E -u lfs "$0" "$@"\nfi' host/04-build-toolchain.sh
          fi

      # Préparer l'hôte en root (crée l'utilisateur lfs et les répertoires)
      - name: Prepare host system (as root)
        run: |
          sudo -E host/02-prepare-host.sh
        env:
          LFS: /tmp/lfs-build/image

      # Copier tout le dépôt dans un endroit accessible par lfs (et root)
      - name: Copy repository to /tmp/lfs-builder
        run: |
          sudo mkdir -p /tmp/lfs-builder
          sudo cp -a . /tmp/lfs-builder/
          sudo chown -R lfs:lfs /tmp/lfs-builder
          sudo chmod -R a+rX /tmp/lfs-builder

      # Exécuter le builder en root (les scripts qui doivent être en lfs se relanceront)
      - name: Build profile (as root)
        id: build
        run: |
          cd /tmp/lfs-builder
          sudo python3 builder.py \
            --profile ${{ matrix.profile }} \
            --init ${{ matrix.init }} \
            --output /tmp/lfs-build

      - name: Upload rootfs
        if: success()
        run: |
          cd /tmp/lfs-build/image
          tar -cJf /tmp/rootfs.tar.xz .

      - name: Upload to Release
        if: success()
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/rootfs.tar.xz
          asset_name: lfs-rootfs-${{ matrix.profile }}-${{ matrix.init }}-${{ matrix.arch }}.tar.xz
          tag: v4.3.0-cache
          overwrite: true

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Global build.log (last 100 lines) ==="
          tail -n 100 /tmp/lfs-build/logs/build.log 2>/dev/null || echo "build.log not found"
          echo "=== Stage logs (last 20 lines each) ==="
          for log in /tmp/lfs-build/logs/*.log; do
            echo "--- $log ---"
            tail -n 20 "$log" 2>/dev/null || echo "Cannot read $log"
          done