name: Build Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [kde, gnome, full]
        init: [systemd]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev
          command -v makeinfo || { echo "makeinfo not found"; exit 1; }

      - name: Show disk space
        run: df -h

      - name: Cache LFS sources
        uses: actions/cache@v4
        with:
          path: /tmp/lfs-build/sources
          key: lfs-sources-${{ matrix.profile }}-${{ hashFiles('packages/sources.list') }}
          restore-keys: lfs-sources-

      - name: Patch host-check.sh to skip texinfo/makeinfo checks in CI
        run: |
          sed -i '/texinfo/d' host/01-check-host.sh
          sed -i '/makeinfo/d' host/01-check-host.sh

      # ------------------------------------------------------------
      # 1. Préparer l'hôte en tant que root (crée l'utilisateur lfs,
      #    le répertoire LFS, et les permissions de base)
      #    La variable LFS est passée explicitement avec sudo -E
      # ------------------------------------------------------------
      - name: Prepare host system (as root)
        run: |
          sudo -E host/02-prepare-host.sh
        env:
          LFS: /tmp/lfs-build/image

      # ------------------------------------------------------------
      # 2. Créer le répertoire de sortie parent et le donner à lfs
      # ------------------------------------------------------------
      - name: Create output directory and set ownership
        run: |
          sudo mkdir -p /tmp/lfs-build
          sudo chown -R lfs:lfs /tmp/lfs-build

      # ------------------------------------------------------------
      # 3. Rendre tout le dépôt lisible/exécutable pour l'utilisateur lfs
      #    (y compris le répertoire courant)
      # ------------------------------------------------------------
      - name: Fix repository permissions for lfs user
        run: |
          sudo chmod -R a+rX .
          # Vérification : afficher les permissions de builder.py
          ls -la builder.py || echo "builder.py not found"

      # ------------------------------------------------------------
      # 4. Lancer le builder en tant que lfs, en reprenant à disk-image
      #    (host-check et host-prepare déjà effectués)
      # ------------------------------------------------------------
      - name: Build profile (as lfs user)
        id: build
        run: |
          sudo -u lfs python3 builder.py \
            --profile ${{ matrix.profile }} \
            --init ${{ matrix.init }} \
            --output /tmp/lfs-build \
            --resume-from disk-image

      - name: Upload rootfs
        if: success()
        run: |
          cd /tmp/lfs-build/image
          tar -cJf /tmp/rootfs.tar.xz .

      - name: Upload to Release
        if: success()
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/rootfs.tar.xz
          asset_name: lfs-rootfs-${{ matrix.profile }}-${{ matrix.init }}-${{ matrix.arch }}.tar.xz
          tag: v4.3.0-cache
          overwrite: true

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Global build.log (last 100 lines) ==="
          tail -n 100 /tmp/lfs-build/logs/build.log 2>/dev/null || echo "build.log not found"
          echo "=== Stage logs (last 20 lines each) ==="
          for log in /tmp/lfs-build/logs/*.log; do
            echo "--- $log ---"
            tail -n 20 "$log" 2>/dev/null || echo "Cannot read $log"
          done