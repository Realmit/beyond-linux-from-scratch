name: Build Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [kde, gnome, full]
        init: [systemd]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev
          # Vérification : texinfo fournit makeinfo, pas une commande 'texinfo'
          command -v makeinfo || { echo "makeinfo not found"; exit 1; }

      - name: Show disk space
        run: df -h

      - name: Cache LFS sources
        uses: actions/cache@v4
        with:
          path: /tmp/lfs-build/sources
          key: lfs-sources-${{ matrix.profile }}-${{ hashFiles('packages/sources.list') }}
          restore-keys: lfs-sources-

      - name: Patch host-check.sh to skip texinfo check in CI
        run: |
          # Supprimer les vérifications de texinfo et makeinfo (si présentes)
          sed -i '/texinfo/d' host/01-check-host.sh
          sed -i '/makeinfo/d' host/01-check-host.sh
          echo "--- host-check.sh modified ---"

      - name: Build profile
        id: build
        continue-on-error: true
        run: |
          mkdir -p /tmp/lfs-build
          python3 builder.py \
            --profile ${{ matrix.profile }} \
            --init ${{ matrix.init }} \
            --output /tmp/lfs-build

      - name: Show host-check log if build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "=== host-check.log ==="
          cat /tmp/lfs-build/logs/host-check.log || echo "Log not found"
          echo "======================="
          exit 1

      - name: Upload rootfs
        if: steps.build.outcome == 'success'
        run: |
          cd /tmp/lfs-build/image
          tar -cJf /tmp/rootfs.tar.xz .

      - name: Upload to Release
        if: steps.build.outcome == 'success'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/rootfs.tar.xz
          asset_name: lfs-rootfs-${{ matrix.profile }}-${{ matrix.init }}-${{ matrix.arch }}.tar.xz
          tag: v4.3.0-cache
          overwrite: true