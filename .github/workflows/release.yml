# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bison flex gawk texinfo wget curl git python3 python3-pip xorriso isolinux mtools dosfstools parted rsync bc cpio kmod libssl-dev libelf-dev
      - name: Build default profile (xfce)
        run: |
          python3 builder.py --profile xfce --output ./build-release
      - name: Build minimal profile
        run: |
          python3 builder.py --profile minimal --output ./build-minimal
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./build-release/lfs-installer.iso
            ./build-minimal/lfs-installer.iso
          generate_release_notes: true