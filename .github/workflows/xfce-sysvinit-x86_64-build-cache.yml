name: XFCE SYSVINIT x86_64 Build Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-cache:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [xfce]
        init: [sysvinit]
        arch: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev ca-certificates
          command -v makeinfo || { echo "makeinfo not found"; exit 1; }

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-cov requests-mock pytest-mock

      - name: Show disk space
        run: df -h

      - name: Update sources.list with official LFS/BLFS URLs
        run: |
          # Télécharge les listes officielles à jour
          wget -q https://www.linuxfromscratch.org/lfs/view/stable/wget-list -O /tmp/lfs.list
          wget -q https://www.linuxfromscratch.org/blfs/view/stable-systemd/wget-list -O /tmp/blfs.list
          
          # Fusionne, supprime les doublons
          cat /tmp/lfs.list /tmp/blfs.list | sort -u > packages/sources.list
          
          # Ajoute les outils de confidentialité à la fin
          cat >> packages/sources.list << 'EOF'
          # Privacy tools
          https://dist.torproject.org/tor-0.4.9.7.tar.gz
          https://git.zx2c4.com/wireguard-tools/snapshot/wireguard-tools-1.0.20210914.tar.xz
          https://github.com/DNSCrypt/dnscrypt-proxy/archive/refs/tags/2.1.16.tar.gz
          https://github.com/i2p/i2p.i2p/archive/refs/tags/i2p-2.12.0.tar.gz
          https://0xacab.org/jvoisin/mat2/-/archive/0.13.4/mat2-0.13.4.tar.gz
          EOF
          
          echo "✅ sources.list mis à jour avec $(wc -l < packages/sources.list) URLs"

      - name: Create output directory
        run: sudo mkdir -p /tmp/lfs-build

      - name: Cache LFS sources
        uses: actions/cache@v4
        with:
          path: /tmp/lfs-build/sources
          key: lfs-sources-${{ matrix.profile }}-${{ hashFiles('packages/sources.list') }}
          restore-keys: lfs-sources-

      - name: Run Python tests
        run: |
          python3 -m pytest tests/ --cov=builder --cov-report=xml -v --tb=short 2>&1 | tee test_output.log

      - name: Check compilation
        run: |
          python3 -m py_compile builder.py
          echo "✅ builder.py compiled successfully"

      - name: Patch host-check.sh
        run: |
          sed -i '/texinfo/d' host/01-check-host.sh
          sed -i '/makeinfo/d' host/01-check-host.sh

      - name: Patch toolchain to switch to lfs
        run: |
          sed -i '1a if [ "$(whoami)" = "root" ] && id "lfs" &>/dev/null; then\n    echo "Switching to lfs user..."\n    exec sudo -E -u lfs "$0" "$@"\nfi' host/04-build-toolchain.sh

      - name: Prepare host system (as root)
        run: |
          sudo -E host/02-prepare-host.sh
        env:
          LFS: /tmp/lfs-build/image

      - name: Copy repository to /tmp/lfs-builder
        run: |
          sudo mkdir -p /tmp/lfs-builder
          sudo cp -a . /tmp/lfs-builder/
          sudo chown -R lfs:lfs /tmp/lfs-builder
          sudo chmod -R a+rX /tmp/lfs-builder

      - name: Reassign ownership of output directory to lfs
        run: |
          sudo chown -R lfs:lfs /tmp/lfs-build

      - name: Build profile (as lfs user)
        id: build
        continue-on-error: true
        run: |
          cd /tmp/lfs-builder
          export LFS_DOWNLOAD_RETRIES=2            
          export LFS_DOWNLOAD_TIMEOUT=5            
          sudo -u lfs python3 builder.py \
            --profile ${{ matrix.profile }} \
            --init ${{ matrix.init }} \
            --no-live \
            --output /tmp/lfs-build

      - name: Verify kernel presence
        run: |
          if ! ls /tmp/lfs-build/image/boot/vmlinuz* >/dev/null 2>&1; then
            echo "Kernel not found in /boot – build failed!"
            ls -la /tmp/lfs-build/image/boot || true
            exit 1
          fi
          echo "Kernel found: $(ls /tmp/lfs-build/image/boot/vmlinuz*)"

      - name: Compress rootfs (exclude virtual filesystems)
        id: compress
        if: success() || failure()
        continue-on-error: true
        run: |
          set -e
          cd /tmp/lfs-build/image
          sudo tar -cJf /tmp/rootfs.tar.xz \
            --exclude='proc' \
            --exclude='sys' \
            --exclude='dev' \
            --exclude='run' \
            --exclude='sources' \
            .
          sudo chown $USER:$USER /tmp/rootfs.tar.xz
          ls -lh /tmp/rootfs.tar.xz

      - name: Get builder version
        id: version
        run: |
          VER=$(python3 -c "from builder import __version__; print(__version__)")
          echo "value=$VER" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Rootfs
        if: success() && steps.compress.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}-cache
          name: Way Beyond LFS Xfce SYSVINIT Cache v${{ steps.version.outputs.value }}
          body: |
            Cache pour LFS/BLFS 13.0
            Profil : ${{ matrix.profile }}
            Init   : ${{ matrix.init }}
            Arch   : ${{ matrix.arch }}
          files: /tmp/rootfs.tar.xz
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Test output ==="
          tail -n 50 test_output.log 2>/dev/null || echo "test_output.log not found"
          echo "=== Global build.log (last 100 lines) ==="
          tail -n 100 /tmp/lfs-build/logs/build.log 2>/dev/null || echo "build.log not found"
          echo "=== Stage logs (last 20 lines each) ==="
          for log in /tmp/lfs-build/logs/*.log; do
            echo "--- $log ---"
            tail -n 20 "$log" 2>/dev/null || echo "Cannot read $log"
          done