name: Nightly Builds

on:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  build-profiles:
    strategy:
      fail-fast: false
      matrix:
        profile: [minimal, xfce, server, secure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (including texinfo for makeinfo)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bison flex gawk texinfo wget git python3 python3-pip \
            xorriso isolinux mtools dosfstools parted rsync bc cpio libssl-dev libelf-dev ca-certificates

      - name: Create lfs user with passwordless sudo
        run: |
          sudo useradd -m -s /bin/bash lfs 2>/dev/null || true
          echo "lfs ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/lfs
          sudo chmod 440 /etc/sudoers.d/lfs
          sudo -u lfs touch /home/lfs/.bashrc

      - name: Prepare build directory
        run: |
          sudo mkdir -p /tmp/lfs-build
          sudo cp -a $GITHUB_WORKSPACE/. /tmp/lfs-build/
          sudo chown -R lfs:lfs /tmp/lfs-build

      - name: Build ${{ matrix.profile }} (as lfs user)
        run: |
          cd /tmp/lfs-build
          sudo -u lfs python3 builder.py \
            --profile ${{ matrix.profile }} \
            --output ./build-${{ matrix.profile }}

      - name: Verify kernel presence
        run: |
          if ! ls /tmp/lfs-build/build-${{ matrix.profile }}/boot/vmlinuz* >/dev/null 2>&1; then
            echo "Kernel not found in /boot – build failed!"
            ls -la /tmp/lfs-build/build-${{ matrix.profile }}/boot || true
            exit 1
          fi
          echo "Kernel found: $(ls /tmp/lfs-build/build-${{ matrix.profile }}/boot/vmlinuz*)"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: lfs-${{ matrix.profile }}-nightly.iso
          path: /tmp/lfs-build/build-${{ matrix.profile }}/lfs-installer.iso