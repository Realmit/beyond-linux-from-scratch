name: Nightly Builds

on:
  schedule:
    - cron: '0 3 * * *'   # 3am daily

jobs:
  build-profiles:
    strategy:
      matrix:
        profile: [minimal, xfce, server, secure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bison flex gawk texinfo wget curl git python3 python3-pip xorriso isolinux mtools dosfstools parted rsync bc cpio kmod libssl-dev libelf-dev

      - name: Patch host-check.sh (remove texinfo/makeinfo checks)
        run: |
          sed -i '/texinfo/d' host/01-check-host.sh
          sed -i '/makeinfo/d' host/01-check-host.sh

      - name: Build ${{ matrix.profile }}
        run: |
          python3 builder.py --profile ${{ matrix.profile }} --output ./build-${{ matrix.profile }}

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: lfs-${{ matrix.profile }}-nightly.iso
          path: ./build-${{ matrix.profile }}/lfs-installer.iso