name: Nightly Builds

on:
  schedule:
    - cron: '0 3 * * *'   # 3am daily

permissions:
  contents: read

jobs:
  build-profiles:
    strategy:
      matrix:
        profile: [minimal, xfce, server, secure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bison flex gawk texinfo wget curl git python3 python3-pip xorriso isolinux texinfo mtools dosfstools parted rsync bc cpio kmod libssl-dev libelf-dev

      - name: Create lfs user
        run: |
          if ! id "lfs" &>/dev/null; then
            sudo useradd -m -s /bin/bash lfs
          fi

      - name: Build ${{ matrix.profile }}
        run: |
          python3 builder.py --profile ${{ matrix.profile }} --output ./build-${{ matrix.profile }}

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: lfs-${{ matrix.profile }}-nightly.iso
          path: ./build-${{ matrix.profile }}/lfs-installer.iso