# .github/workflows/profile-matrix.yml
name: Profile Matrix Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [minimal, xfce, server, audio-cli]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bison flex gawk texinfo wget curl git python3 python3-pip xorriso isolinux mtools dosfstools parted rsync bc cpio kmod libssl-dev libelf-dev
      - name: Build ${{ matrix.profile }}
        run: |
          python3 builder.py --profile ${{ matrix.profile }} --output ./build-${{ matrix.profile }}
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lfs-${{ matrix.profile }}
          path: ./build-${{ matrix.profile }}/lfs-installer.iso