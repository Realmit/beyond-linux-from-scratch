# ============================================================================
# NETWORK CONFIGURATION
# For system network setup (independent of init system)
# ============================================================================

# ============================================================================
# HOSTNAME AND DOMAIN
# ============================================================================
HOSTNAME="lfs-desktop"
DOMAIN="localdomain"
FQDN="${HOSTNAME}.${DOMAIN}"

# ============================================================================
# NETWORK INTERFACES
# ============================================================================
# Primary network interface
PRIMARY_INTERFACE="eth0"

# Interface configuration method
# Options: dhcp, static
INTERFACE_CONFIG="dhcp"

# Static IP configuration (if INTERFACE_CONFIG=static)
STATIC_IP="192.168.1.100"
STATIC_NETMASK="255.255.255.0"
STATIC_GATEWAY="192.168.1.1"
STATIC_DNS1="8.8.8.8"
STATIC_DNS2="8.8.4.4"

# ============================================================================
# DNS CONFIGURATION
# ============================================================================
# DNS servers (space-separated)
DNS_SERVERS="8.8.8.8 1.1.1.1"

# DNS search domains
DNS_SEARCH="localdomain"

# DNS resolver implementation
# Options: systemd-resolved, dnsmasq, resolvconf, none
DNS_RESOLVER="none"

# ============================================================================
# WI-FI CONFIGURATION (if applicable)
# ============================================================================
# Enable Wi-Fi
WIFI_ENABLED="false"

# Wi-Fi interface
WIFI_INTERFACE="wlan0"

# Wi-Fi SSID
WIFI_SSID=""

# Wi-Fi password (PSK)
WIFI_PSK=""

# Wi-Fi country code (for regulatory compliance)
WIFI_COUNTRY="US"

# ============================================================================
# NETWORK SERVICES
# ============================================================================
# Enable SSH server
SSH_ENABLED="true"
SSH_PORT="22"

# Enable NTP client
NTP_ENABLED="true"
NTP_SERVERS="0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org"

# Enable mDNS (Avahi)
MDNS_ENABLED="false"

# Enable DHCP server (for local network)
DHCP_SERVER_ENABLED="false"
DHCP_RANGE_START="192.168.1.50"
DHCP_RANGE_END="192.168.1.150"
DHCP_LEASE_TIME="86400"

# ============================================================================
# PROXY SETTINGS (for corporate networks)
# ============================================================================
HTTP_PROXY=""
HTTPS_PROXY=""
FTP_PROXY=""
NO_PROXY="localhost,127.0.0.1,localaddress,.localdomain.com"

# ============================================================================
# NETWORK PERFORMANCE
# ============================================================================
# TCP buffer sizes (for high-bandwidth networks)
TCP_RMEM="4096 87380 6291456"
TCP_WMEM="4096 65536 6291456"

# Enable TCP BBR congestion control
TCP_CONGESTION_CONTROL="bbr"

# Network interface queue length
NETDEV_MAX_BACKLOG="1000"

# ============================================================================
# FIREWALL (basic)
# ============================================================================
# Enable firewall
FIREWALL_ENABLED="false"

# Default policies
FIREWALL_INPUT_POLICY="ACCEPT"
FIREWALL_OUTPUT_POLICY="ACCEPT"
FIREWALL_FORWARD_POLICY="DROP"

# Allowed incoming ports (when firewall enabled)
FIREWALL_ALLOW_PORTS="22 80 443"

# ============================================================================
# END OF NETWORK CONFIGURATION
# ============================================================================