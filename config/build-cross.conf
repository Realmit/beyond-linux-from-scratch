# ============================================================================
# CROSS-COMPILATION BUILD CONFIGURATION
# For building LFS for different architectures
# ============================================================================

# ============================================================================
# CROSS-COMPILATION SETTINGS
# ============================================================================
# Enable cross-compilation mode
CROSS_COMPILE="true"

# Host architecture (machine building the system)
HOST_ARCH="x86_64"

# Target architecture (machine running LFS)
TARGET_ARCH="${ARCH:-aarch64}"

# Cross-compiler prefix
CROSS_PREFIX="${TARGET_ARCH}-lfs-linux-gnu-"

# Cross-compilation toolchain directory
CROSS_TOOLS="/usr/local/cross-tools"

# ============================================================================
# CROSS-COMPILATION FLAGS
# ============================================================================
# Configure flags for cross-compilation
CONFIGURE_FLAGS="--build=${HOST_ARCH}-pc-linux-gnu --host=${TARGET_ARCH}-lfs-linux-gnu"

# Kernel headers for target
KERNEL_HEADERS="${CROSS_TOOLS}/${TARGET_ARCH}/include"

# Sysroot for target
SYSROOT="${CROSS_TOOLS}/${TARGET_ARCH}/sysroot"

# ============================================================================
# TARGET-SPECIFIC SETTINGS
# ============================================================================
case "$TARGET_ARCH" in
    aarch64)
        CFLAGS="-O2 -march=armv8-a -mtune=cortex-a72"
        KERNEL_ARCH="arm64"
        ;;
    armv7hl)
        CFLAGS="-O2 -march=armv7-a -mfpu=neon -mfloat-abi=hard"
        KERNEL_ARCH="arm"
        ;;
    i686)
        CFLAGS="-O2 -march=i686 -mtune=generic"
        KERNEL_ARCH="x86"
        ;;
    x86_64)
        CFLAGS="-O2 -march=x86-64 -mtune=generic"
        KERNEL_ARCH="x86"
        ;;
esac

# ============================================================================
# QEMU USER MODE (for running target binaries)
# ============================================================================
# Use QEMU user mode to run cross-compiled binaries
USE_QEMU_USER="true"
QEMU_STATIC="/usr/bin/qemu-${TARGET_ARCH}-static"

# ============================================================================
# DISTCC (distributed compilation)
# ============================================================================
USE_DISTCC="false"
DISTCC_HOSTS="localhost"