{
  "lfs_version": "12.2",
  "blfs_version": "12.2",
  "architecture": "aarch64",
  "target_triplet": "aarch64-lfs-linux-gnu",
  "build_threads": 8,

  "cross_compile": true,
  "cross_prefix": "/usr/bin/aarch64-linux-gnu-",
  "sysroot": "/sysroots/aarch64-lfs",
  "qemu_user": "qemu-aarch64-static",

  "init_system": {
    "choice": "systemd",
    "service_style": "classic",
    "parallel_startup": true
  },

  "package_manager": {
    "enabled": true,
    "name": "lpm"
  },

  "java_dev": {
    "enabled": false
  },

  "desktop": {
    "type": "none",
    "extras": []
  },

  "filesystem": {
    "type": "ext4",
    "size_mb": 4096,
    "swap_mb": 1024,
    "boot_mb": 256
  },

  "kernel": {
    "version": "6.12.10",
    "config": "config/kernel-config-arm64",
    "dtbs": true,
    "modules": ["ext4", "virtio", "nvme", "usb_storage"]
  },

  "bootloader": {
    "type": "uboot",
    "config": "config/u-boot.config"
  },

  "locale": "en_US.UTF-8",
  "timezone": "UTC",
  "hostname": "lfs-arm64",

  "users": [
    {"name": "lfsuser", "groups": ["wheel"], "sudo": true}
  ],

  "network": {
    "dhcp": true,
    "dns_servers": ["8.8.8.8", "8.8.4.4"]
  },

  "security": {
    "kernel_hardening": true,
    "firewall": {"enabled": false},
    "user_hardening": {"disable_root_login": true}
  },

  "build_options": {
    "parallel_build": true,
    "strip_binaries": true,
    "checksum_verification": true
  }
}