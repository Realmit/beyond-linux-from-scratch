{
  "lfs_version": "12.1",
  "blfs_version": "12.1",
  "architecture": "x86_64",
  "target_triplet": "x86_64-lfs-linux-gnu",
  "build_threads": 8,

  "init_system": {
    "choice": "systemd",
    "available": ["systemd", "sysv", "openrc", "runit", "s6"],
    "service_style": "classic",
    "parallel_startup": true,
    "auto_restart": true,
    "default_runlevel": 5,
    "service_timeout": 5,
    "max_parallel": 4
  },

  "package_manager": {
    "enabled": true,
    "name": "lpm",
    "version": "1.0.0",
    "repositories": ["official", "community", "local"],
    "auto_clean": true,
    "backup_before_remove": true,
    "dependency_resolution": true,
    "cache_size_mb": 5120
  },

  "java_dev": {
    "enabled": false,
    "version": "21.0.6",
    "distribution": "temurin",
    "tools": ["maven", "gradle", "tomcat", "jenkins", "docker", "kubectl"],
    "optimizations": true,
    "demo_projects": true,
    "jvm_heapsize_mb": 2048,
    "enable_gc_tuning": true
  },

  "desktop": {
    "type": "xfce",
    "display_manager": "lightdm",
    "theme": "adwaita",
    "icon_theme": "Adwaita",
    "cursor_theme": "Adwaita",
    "font_family": "Noto Sans 10",
    "wallpaper": "/usr/share/backgrounds/default.jpg",
    "enable_compositing": true,
    "enable_desktop_icons": true,
    "panel_position": "bottom",
    "panel_size": 36,
    "extras": [
      "firefox",
      "libreoffice",
      "gimp",
      "vlc",
      "thunar",
      "xfce4-terminal",
      "ristretto",
      "mousepad",
      "parole",
      "gigolo"
    ]
  },

  "filesystem": {
    "type": "ext4",
    "size_mb": 10240,
    "swap_mb": 2048,
    "boot_mb": 512,
    "compress": false,
    "noatime": true,
    "discard": false,
    "encryption": false
  },

  "kernel": {
    "version": "6.6.14",
    "config": "config/kernel-config",
    "modules": [
      "ext4",
      "xfs",
      "nvme",
      "virtio",
      "usb_storage",
      "overlay",
      "brtfs",
      "zfs",
      "fuse",
      "vfat",
      "ntfs"
    ],
    "custom_patches": [],
    "enable_module_compression": true,
    "enable_debug": false
  },

  "network": {
    "hostname": "lfs-desktop",
    "dhcp": true,
    "static_ip": "",
    "static_netmask": "",
    "static_gateway": "",
    "dns_servers": ["8.8.8.8", "8.8.4.4", "1.1.1.1"],
    "enable_ipv6": true,
    "enable_wireless": true,
    "enable_bluetooth": true,
    "firewall": {
      "enabled": false,
      "allow_ssh": true,
      "allow_http": false,
      "allow_https": false
    }
  },

  "locale": "en_US.UTF-8",
  "timezone": "America/New_York",
  "hostname": "lfs-desktop",
  "keyboard_layout": "us",
  "keyboard_variant": "",

  "users": [
    {
      "name": "lfsuser",
      "password": "lfsuser123",
      "groups": ["wheel", "audio", "video", "storage", "users"],
      "shell": "/bin/bash",
      "home": "/home/lfsuser",
      "sudo": true,
      "autologin": true
    },
    {
      "name": "root",
      "password": "root123",
      "autologin": false
    }
  ],

  "security": {
    "selinux": false,
    "apparmor": false,
    "firejail": false,
    "hardened_malloc": false,
    "kernel_hardening": true,
    "enable_auditd": false,
    "password_policy": {
      "min_length": 8,
      "require_digit": true,
      "require_upper": true,
      "require_lower": true
    },
    "sshd": {
      "enabled": true,
      "port": 22,
      "disable_root_login": true,
      "password_auth": true,
      "key_auth": true
    }
  },

  "custom_scripts": {
    "pre_install": [
      "packages/custom-scripts/pre-install.sh"
    ],
    "post_install": [
      "packages/custom-scripts/post-install.sh",
      "packages/custom-scripts/theme-setup.sh"
    ],
    "first_boot": [
      "packages/custom-scripts/first-boot.sh"
    ]
  },

  "repositories": [
    "https://www.linuxfromscratch.org/lfs/view/stable/wget-list",
    "https://www.linuxfromscratch.org/blfs/view/stable/wget-list",
    "https://raw.githubusercontent.com/lfs-builds/repo/main/packages.list"
  ],

  "build_options": {
    "parallel_build": true,
    "keep_build_dirs": false,
    "compress_man_pages": true,
    "strip_binaries": true,
    "remove_locale_archives": true,
    "verbose_logging": false,
    "download_timeout_seconds": 300,
    "retry_downloads": 3,
    "checksum_verification": true,
    "signature_verification": false,
    "backup_before_upgrade": true,
    "auto_remove_dependencies": false
  },

  "logging": {
    "level": "INFO",
    "max_size_mb": 100,
    "max_files": 10,
    "enable_debug": false,
    "enable_timestamps": true,
    "log_build_output": true
  }
}