{
  "lfs_version": "12.1",
  "blfs_version": "12.1",
  "architecture": "x86_64",
  "target_triplet": "x86_64-lfs-linux-gnu",

  "desktop": {
    "type": "xfce",
    "display_manager": "lightdm",
    "theme": "adwaita",
    "extras": [
      "firefox",
      "libreoffice",
      "gimp",
      "vlc"
    ]
  },

  "filesystem": {
    "type": "ext4",
    "size_mb": 8192,
    "swap_mb": 2048,
    "boot_mb": 512
  },

  "kernel": {
    "version": "6.6.14",
    "config": "config/kernel-config",
    "modules": [
      "ext4",
      "xfs",
      "nvme",
      "virtio",
      "usb_storage"
    ]
  },

  "locale": "en_US.UTF-8",
  "timezone": "America/New_York",
  "hostname": "lfs-desktop",

  "users": [
    {
      "name": "lfsuser",
      "groups": ["wheel", "audio", "video", "storage"]
    }
  ],

  "custom_scripts": [
    "packages/custom-scripts/post-install.sh"
  ],

  "repositories": [
    "https://www.linuxfromscratch.org/lfs/view/stable/wget-list",
    "https://www.linuxfromscratch.org/blfs/view/stable/wget-list"
  ]
}