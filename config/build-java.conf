# ============================================================================
# JAVA DEVELOPMENT BUILD CONFIGURATION
# For Java development environment on LFS
# ============================================================================

# ============================================================================
# JDK CONFIGURATION
# ============================================================================
# JDK distribution
# Options: temurin, openjdk, oracle, adoptium
JDK_DISTRO="temurin"

# JDK version (LTS recommended)
JDK_VERSION="21"

# JDK 21.0.10 specifics
JDK_URL="https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.10%2B9/OpenJDK21U-jdk_x64_linux_hotspot_21.0.10_9.tar.gz"
JDK_HOME="/usr/lib/jvm/java-${JDK_VERSION}-temurin"

# ============================================================================
# BUILD TOOLS
# ============================================================================
# Maven configuration
MAVEN_VERSION="3.9.9"
MAVEN_HOME="/usr/share/maven"
MAVEN_OPTS="-Xms512m -Xmx1024m"

# Gradle configuration
GRADLE_VERSION="8.15"
GRADLE_HOME="/usr/share/gradle"
GRADLE_OPTS="-Xms512m -Xmx1024m"

# ============================================================================
# APPLICATION SERVERS
# ============================================================================
# Tomcat configuration
TOMCAT_VERSION="10.1.39"
TOMCAT_HOME="/usr/share/tomcat"
TOMCAT_USER="tomcat"
TOMCAT_GROUP="tomcat"

# ============================================================================
# BUILD OPTIONS
# ============================================================================
# Enable Java compilation daemon (speeds up builds)
USE_JAVA_DAEMON="true"

# Maven mirror (for faster downloads)
MAVEN_MIRROR="https://repo.maven.apache.org/maven2"

# Gradle wrapper (use project-local Gradle)
USE_GRADLE_WRAPPER="true"