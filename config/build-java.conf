{
  "lfs_version": "12.1",
  "blfs_version": "12.1",
  "architecture": "x86_64",
  "target_triplet": "x86_64-lfs-linux-gnu",
  "build_threads": 8,

  "init_system": {
    "choice": "systemd",
    "service_style": "classic",
    "parallel_startup": true
  },

  "package_manager": {
    "enabled": true,
    "name": "lpm",
    "dependency_resolution": true
  },

  "java_dev": {
    "enabled": true,
    "version": "21.0.6",
    "distribution": "temurin",
    "tools": ["maven", "gradle", "tomcat", "jenkins", "docker", "kubectl"],
    "optimizations": true,
    "demo_projects": true,
    "jvm_heapsize_mb": 4096
  },

  "desktop": {
    "type": "xfce",
    "display_manager": "lightdm",
    "theme": "adwaita",
    "extras": ["firefox", "intellij-idea-community", "vscode", "docker-desktop"],
    "enable_desktop_icons": true
  },

  "filesystem": {
    "type": "ext4",
    "size_mb": 20480,
    "swap_mb": 4096,
    "boot_mb": 512
  },

  "kernel": {
    "version": "6.6.14",
    "config": "config/kernel-config",
    "modules": ["ext4", "xfs", "nvme", "virtio", "usb_storage", "overlay", "vfat"]
  },

  "network": {
    "hostname": "lfs-dev",
    "dhcp": true,
    "dns_servers": ["8.8.8.8", "8.8.4.4"],
    "enable_ipv6": true
  },

  "locale": "en_US.UTF-8",
  "timezone": "America/New_York",
  "hostname": "lfs-dev",

  "users": [
    {
      "name": "developer",
      "groups": ["wheel", "audio", "video", "storage", "docker"],
      "sudo": true,
      "autologin": true,
      "shell": "/bin/bash"
    }
  ],

  "security": {
    "sshd": {
      "enabled": true,
      "port": 2222,
      "disable_root_login": true
    },
    "firewall": {
      "enabled": true,
      "allow_ssh": true,
      "allow_http": false,
      "allow_https": false
    }
  },

  "custom_scripts": [
    "packages/custom-scripts/java-setup.sh",
    "packages/custom-scripts/ide-setup.sh"
  ],

  "repositories": [
    "https://www.linuxfromscratch.org/lfs/view/stable/wget-list",
    "https://www.linuxfromscratch.org/blfs/view/stable/wget-list",
    "https://repo.jetbrains.com/linux/releases",
    "https://packages.microsoft.com/repos/code"
  ],

  "build_options": {
    "parallel_build": true,
    "keep_build_dirs": false,
    "compress_man_pages": true,
    "strip_binaries": true,
    "checksum_verification": true,
    "verbose_logging": false
  },

  "logging": {
    "level": "INFO",
    "max_size_mb": 50,
    "max_files": 5,
    "log_build_output": true
  }
}