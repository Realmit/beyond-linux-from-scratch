# ============================================================================
# CROSS-COMPILATION CONFIGURATION FOR MOBILE (Android ARM64)
# ============================================================================

# Architecture cible
ARCH="aarch64"
TARGET_TRIPLET="aarch64-lfs-linux-gnu"

# Cross-compilation toolchain
CROSS_COMPILE="true"
CROSS_PREFIX="/usr/bin/aarch64-linux-gnu-"

# QEMU user emulation
QEMU_USER="qemu-aarch64-static"

# Sysroot pour Android
SYSROOT="/usr/aarch64-linux-gnu/sysroot"

# Optimisations pour mobile
CFLAGS="-O2 -pipe -march=armv8-a -mtune=cortex-a73"
CXXFLAGS="-O2 -pipe -march=armv8-a -mtune=cortex-a73"

# Kernel pour Android
KERNEL_VERSION="6.12.20"
KERNEL_CONFIG="config/kernel-config-arm64"

# Bootloader (pas utilisé pour Android chroot)
BOOTLOADER_TYPE="none"

# Init system (sysvinit préféré pour Android)
INIT_SYSTEM="sysvinit"