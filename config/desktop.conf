# Desktop Environment Configuration for LFS/BLFS
# ============================================================================

# ============================================================================
# GENERAL DESKTOP SETTINGS
# ============================================================================
DESKTOP_ENV="xfce"           # Options: xfce, gnome, kde, lxqt, none
DISPLAY_MANAGER="lightdm"    # Options: lightdm, gdm, sddm, none
WINDOW_MANAGER="xfwm4"       # Will be set automatically based on DESKTOP_ENV

# ============================================================================
# DISPLAY SETTINGS
# ============================================================================
DEFAULT_RESOLUTION="1920x1080"
DEFAULT_REFRESH_RATE="60"
DEFAULT_COLOR_DEPTH="24"
ENABLE_COMPOSITING="yes"
ENABLE_HARDWARE_ACCELERATION="yes"

# ============================================================================
# THEME SETTINGS
# ============================================================================
ICON_THEME="Adwaita"
GTK_THEME="Adwaita"
CURSOR_THEME="Adwaita"
FONT_FAMILY="Noto Sans 10"
MONOSPACE_FONT="Noto Mono 11"
WINDOW_BUTTON_LAYOUT="menu:minimize,maximize,close"

# ============================================================================
# PANEL SETTINGS (XFCE specific)
# ============================================================================
PANEL_POSITION="bottom"          # top, bottom, left, right
PANEL_SIZE="36"                  # pixels
PANEL_AUTOHIDE="false"
PANEL_TRANSPARENCY="0"
PANEL_PLUGINS="applications-menu,tasklist,workspace-switcher,notification-area,pulseaudio,power-manager,clock"

# ============================================================================
# DESKTOP BACKGROUND
# ============================================================================
WALLPAPER="/usr/share/backgrounds/default.jpg"
WALLPAPER_MODE="stretched"       # stretched, centered, scaled, tiled, zoomed
SOLID_BG_COLOR="#2e3436"
ENABLE_DESKTOP_ICONS="true"

# ============================================================================
# COMPOSITOR SETTINGS
# ============================================================================
ENABLE_SHADOWS="true"
ENABLE_TRANSPARENCY="true"
ENABLE_FADE="true"
SHADOW_RADIUS="12"
SHADOW_OPACITY="0.6"
FADE_DURATION="0.2"

# ============================================================================
# POWER MANAGEMENT
# ============================================================================
SCREEN_BLANK_TIMEOUT="600"       # seconds
SUSPEND_TIMEOUT="1800"           # seconds
LID_CLOSE_ACTION="suspend"       # suspend, hibernate, shutdown, nothing
BUTTON_POWER="suspend"
BUTTON_SLEEP="suspend"

# ============================================================================
# KEYBOARD & MOUSE
# ============================================================================
KEYBOARD_LAYOUT="us"
KEYBOARD_VARIANT=""
MOUSE_ACCELERATION="2"
MOUSE_SENSITIVITY="1"
TOUCHPAD_TAP_TO_CLICK="true"
TOUCHPAD_NATURAL_SCROLL="false"

# ============================================================================
# SCREENSAVER / LOCK SCREEN
# ============================================================================
ENABLE_SCREENSAVER="true"
SCREENSAVER_TIMEOUT="300"        # seconds
LOCK_SCREEN_ON_SUSPEND="true"
LOCK_SCREEN_AFTER="300"          # seconds idle

# ============================================================================
# SOUND SETTINGS
# ============================================================================
DEFAULT_SINK="0"
DEFAULT_VOLUME="75"
ENABLE_AUDIO_NOTIFICATIONS="true"
AUDIO_THEME="freedesktop"

# ============================================================================
# STARTUP APPLICATIONS
# ============================================================================
STARTUP_APPS=(
    "nm-applet"
    "blueman-applet"
    "volumeicon"
    "xfce4-power-manager"
    "xfce4-clipman"
)

# ============================================================================
# SHORTCUTS (Key bindings)
# ============================================================================
declare -A KEYBINDINGS=(
    ["super+t"]="xfce4-terminal"
    ["super+e"]="thunar"
    ["super+f"]="firefox"
    ["super+space"]="xfce4-appfinder"
    ["ctrl+alt+t"]="xfce4-terminal"
    ["ctrl+alt+l"]="xflock4"
    ["ctrl+alt+del"]="xfce4-session-logout"
    ["print"]="xfce4-screenshooter"
)

# ============================================================================
# AUTOSTART SERVICES
# ============================================================================
AUTOSTART_SERVICES=(
    "dbus"
    "NetworkManager"
    "bluetooth"
    "cups"
    "tlp"                    # power management for laptops
)

# ============================================================================
# COMPRESSION & PERFORMANCE
# ============================================================================
ENABLE_PRELOAD="yes"         # preload frequently used apps
ENABLE_ZYGA="no"            # chromium acceleration
SWAPPINESS="10"
CACHE_PRESSURE="50"

# ============================================================================
# MULTIMEDIA KEYS (if available)
# ============================================================================
ENABLE_MULTIMEDIA_KEYS="true"
VOLUME_UP_COMMAND="amixer set Master 5%+"
VOLUME_DOWN_COMMAND="amixer set Master 5%-"
VOLUME_MUTE_COMMAND="amixer set Master toggle"
PLAY_PAUSE_COMMAND="playerctl play-pause"
NEXT_TRACK_COMMAND="playerctl next"
PREV_TRACK_COMMAND="playerctl previous"

# ============================================================================
# GNOME SPECIFIC SETTINGS (if GNOME is selected)
# ============================================================================
GNOME_EXTENSIONS=(
    "dash-to-dock"
    "user-themes"
    "clipboard-indicator"
    "caffeine"
)
GNOME_DOCK_POSITION="bottom"
GNOME_TOP_BAR_CLOCK_FORMAT="%a %b %d %H:%M"

# ============================================================================
# KDE SPECIFIC SETTINGS (if KDE is selected)
# ============================================================================
KDE_PANEL_POSITION="bottom"
KDE_LATTE_DOCK="false"
KDE_BLUR="true"
KDE_ANIMATIONS="true"

# ============================================================================
# LXQT SPECIFIC SETTINGS (if LXQT is selected)
# ============================================================================
LXQT_STYLE="fusion"
LXQT_ICON_THEME="oxygen"