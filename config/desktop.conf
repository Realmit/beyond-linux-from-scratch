# ============================================================================
# DESKTOP ENVIRONMENT CONFIGURATION
# ============================================================================

# ============================================================================
# DESKTOP SELECTION
# ============================================================================
# Options: none, xfce, gnome, kde, lxqt, custom
DESKTOP_ENVIRONMENT="xfce"

# Display manager
# Options: lightdm, gdm, sddm, none
DISPLAY_MANAGER="lightdm"

# Window manager (if no full DE)
# Options: i3, openbox, fluxbox, awesome, none
WINDOW_MANAGER="none"

# ============================================================================
# XFCE SPECIFIC (if DESKTOP_ENVIRONMENT=xfce)
# ============================================================================
XFCE_VERSION="4.20"
XFCE_COMPONENTS="panel,desktop,settings,session,terminal,taskmanager"

# XFCE goodies (extra plugins and applications)
INSTALL_XFCE_GOODIES="true"

# ============================================================================
# GNOME SPECIFIC (if DESKTOP_ENVIRONMENT=gnome)
# ============================================================================
GNOME_VERSION="46"
GNOME_CORE="shell,session,control-center,desktop,settings-daemon,keyring"

# GNOME applications
INSTALL_GNOME_APPS="files,terminal,software,calculator,calendar,music"

# Use Wayland instead of X11 (GNOME default)
USE_WAYLAND="true"

# ============================================================================
# KDE/PLASMA SPECIFIC (if DESKTOP_ENVIRONMENT=kde)
# ============================================================================
KDE_VERSION="6.2"
PLASMA_COMPONENTS="desktop,workspace,discover,systemsettings"

# KDE applications
INSTALL_KDE_APPS="dolphin,kate,konsole,okular,gwenview"

# ============================================================================
# COMMON DESKTOP SETTINGS
# ============================================================================
# Default theme
GTK_THEME="Adwaita"
ICON_THEME="Adwaita"

# Fonts
DEFAULT_FONT="Noto Sans 10"
MONOSPACE_FONT="Source Code Pro 10"

# Cursor theme
CURSOR_THEME="Adwaita"
CURSOR_SIZE="24"

# ============================================================================
# DESKTOP APPLICATIONS
# ============================================================================
# Office suite
# Options: libreoffice, onlyoffice, none
OFFICE_SUITE="libreoffice"

# Image viewer
IMAGE_VIEWER="eog"  # or ristretto for XFCE, gwenview for KDE

# PDF viewer
PDF_VIEWER="evince"  # or atril, okular

# Terminal emulator
TERMINAL_EMULATOR="xfce4-terminal"  # or gnome-terminal, konsole

# File manager
FILE_MANAGER="thunar"  # or nautilus, dolphin

# ============================================================================
# ACCESSIBILITY
# ============================================================================
# Enable screen reader (Orca)
ENABLE_SCREEN_READER="false"

# Enable high contrast theme
ENABLE_HIGH_CONTRAST="false"

# Large text (for visually impaired)
LARGE_TEXT="false"