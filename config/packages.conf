# ============================================================================
# PACKAGE SELECTION CONFIGURATION
# For custom builds and profile selection
# ============================================================================

# ============================================================================
# BASE SYSTEM (always included)
# ============================================================================
BASE_PACKAGES="linux-headers,glibc,gcc,binutils,make,bash,coreutils,util-linux"
BASE_PACKAGES="${BASE_PACKAGES},procps,psmisc,findutils,grep,sed,gawk,diffutils"
BASE_PACKAGES="${BASE_PACKAGES},patch,tar,gzip,xz,bzip2,zlib,file,which,less"

# ============================================================================
# NETWORK PACKAGES
# ============================================================================
NETWORK_PACKAGES="iproute2,iputils,openssh,curl,wget,openssl,ca-certificates"
NETWORK_PACKAGES="${NETWORK_PACKAGES},dhcpcd,iw,wireless-tools"

# ============================================================================
# TOOLCHAIN EXTENSIONS
# ============================================================================
TOOLCHAIN_PACKAGES="cmake,meson,ninja,pkg-config,git,subversion"
TOOLCHAIN_PACKAGES="${TOOLCHAIN_PACKAGES},autoconf,automake,libtool,m4,bison,flex"

# ============================================================================
# DESKTOP PACKAGES (for GUI profiles)
# ============================================================================
XORG_PACKAGES="xorg-server,xorg-apps,xorg-fonts,xorg-drivers"
XFCE_PACKAGES="xfce4,xfce4-panel,xfce4-session,thunar,xfdesktop"
GNOME_PACKAGES="gnome-shell,gnome-session,gnome-control-center,nautilus"
KDE_PACKAGES="plasma-desktop,dolphin,kate,kde-systemsettings"

# ============================================================================
# AUDIO PACKAGES
# ============================================================================
AUDIO_CORE_PACKAGES="alsa-lib,alsa-utils,jack2,pipewire,wireplumber"
AUDIO_DAW_PACKAGES="ardour,lmms,audacity,qtractor"
AUDIO_PLUGINS_PACKAGES="calf-plugins,lsp-plugins,dragonfly-reverb,swh-plugins"
AUDIO_MIDI_PACKAGES="fluidsynth,timidity++,wildmidi,linuxsampler"

# ============================================================================
# DEVELOPMENT PACKAGES
# ============================================================================
DEV_PACKAGES="gcc,g++,make,cmake,git,python3,perl,nodejs"
JAVA_PACKAGES="openjdk,maven,gradle,tomcat"
CONTAINER_PACKAGES="docker,docker-compose,podman"

# ============================================================================
# SECURITY PACKAGES
# ============================================================================
SECURITY_PACKAGES="fail2ban,lynis,rkhunter,iptables,nftables"
SECURITY_PACKAGES="${SECURITY_PACKAGES},openssh,openssl,ca-certificates"

# ============================================================================
# PROFILE DEFINITIONS
# ============================================================================
PROFILE_MINIMAL="base"
PROFILE_SERVER="base,network,toolchain,security"
PROFILE_DESKTOP="base,network,xorg,xfce"
PROFILE_AUDIO_CLI="base,network,audio-core,audio-midi"
PROFILE_AUDIO_DESKTOP="base,network,xorg,xfce,audio-core,audio-daw,audio-plugins"
PROFILE_JAVA_DEV="base,network,toolchain,java"
PROFILE_FULL="base,network,toolchain,xorg,gnome,audio-core,audio-daw,java,security"