# ============================================================================
# LFS BUILD CONFIGURATION
# Core LFS build settings (sourced by chroot scripts)
# ============================================================================

# LFS mount point
LFS="/mnt/lfs"

# LFS version
LFS_VERSION="13.0"

# Target architecture
LFS_ARCH="x86_64"

# Target triplet
LFS_TARGET="x86_64-lfs-linux-gnu"

# Number of parallel jobs
MAKEFLAGS="-j$(nproc)"

# Compiler flags
CFLAGS="-O2 -pipe"
CXXFLAGS="-O2 -pipe"

# Use ccache
USE_CCACHE="false"

# Strip binaries
STRIP_BINARIES="true"

# Locale settings
LANG="en_US.UTF-8"
LC_ALL="en_US.UTF-8"

# Timezone
TIMEZONE="America/New_York"

# Hostname
HOSTNAME="lfs-desktop"

# Default shell for root
ROOT_SHELL="/bin/bash"

# Create lfs user (for building)
CREATE_LFS_USER="true"
LFS_USER="lfs"
LFS_USER_UID="1000"
LFS_USER_GROUP="lfs"
LFS_USER_GID="1000"
LFS_USER_PASSWORD="lfs"

# Kernel configuration
KERNEL_CONFIG="/sources/kernel-config"

# Kernel version
KERNEL_VERSION="6.12.20"

# GRUB configuration
GRUB_DISABLE_OS_PROBER="true"
GRUB_TIMEOUT="5"
GRUB_DEFAULT="0"

# Init system (set by init.conf)
INIT_SYSTEM="sysvinit"