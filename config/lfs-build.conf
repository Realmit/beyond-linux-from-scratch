#!/bin/bash
# LFS Build Configuration - User editable
# Copy this to /etc/lfs-build.conf before building

# ============================================================================
# INIT SYSTEM SELECTION
# ============================================================================
# Choose your init system:
#   systemd  - Modern, feature-rich (default)
#   sysv     - Classic Unix init scripts
#   openrc   - Dependency-based, fast (Gentoo style)
#   runit    - Simple service supervision
#   s6       - Small, secure supervision suite

INIT_SYSTEM="systemd"

# Service management style:
#   classic     - Manual start/stop via rc scripts
#   supervision - Automatic service monitoring (requires runit/s6)

SERVICE_STYLE="classic"

# ============================================================================
# ADDITIONAL OPTIONS
# ============================================================================

# Enable parallel service startup (faster boot)
PARALLEL_STARTUP="true"

# Enable service restart on failure
AUTO_RESTART="true"

# Default runlevel/target (3=multi-user, 5=graphical)
DEFAULT_RUNLEVEL="5"

# ============================================================================
# Save this file to /etc/lfs-build.conf before building
# The build system will automatically detect and use these settings
# ============================================================================