# ============================================================================
# LPM (LFS Package Manager) CONFIGURATION
# ============================================================================

# ============================================================================
# PATHS
# ============================================================================
LPM_DB="/var/lib/lpm/db.json"
LPM_REPOS="/etc/lpm/repos.d"
LPM_CACHE="/var/cache/lpm"
LPM_BUILD_DIR="/var/lib/lpm/build"
LPM_PACKAGES_DIR="/var/lib/lpm/packages"

# ============================================================================
# REPOSITORY SETTINGS
# ============================================================================
# Default repository
DEFAULT_REPO="lfs-stable"

# Repository mirrors (fallback order)
REPO_MIRRORS="https://mirrors.kernel.org/lfs,https://lfs.osuosl.org/pub/lfs"

# GPG verification (verify package signatures)
GPG_VERIFY="true"

# GPG keyring for repositories
GPG_KEYRING="/etc/lpm/trusted.gpg"

# ============================================================================
# DOWNLOAD SETTINGS
# ============================================================================
# Maximum number of parallel downloads
DOWNLOAD_MAX_CONNECTIONS="4"

# Download timeout (seconds)
DOWNLOAD_TIMEOUT="60"

# Number of retries on failure
DOWNLOAD_RETRIES="3"

# User agent for downloads
DOWNLOAD_USER_AGENT="LPM/1.0"

# ============================================================================
# BUILD SETTINGS
# ============================================================================
# Build directory for source extraction
BUILD_DIR="/var/lib/lpm/build"

# Keep build artifacts after installation
KEEP_BUILD_ARTIFACTS="false"

# Run tests before installation
RUN_TESTS="basic"

# Parallel build jobs
BUILD_JOBS="$(nproc)"

# Compiler flags for LPM builds
BUILD_CFLAGS="-O2 -pipe"
BUILD_CXXFLAGS="-O2 -pipe"

# ============================================================================
# DEPENDENCY RESOLUTION
# ============================================================================
# Auto-install dependencies
AUTO_INSTALL_DEPS="true"

# Check for circular dependencies
CHECK_CIRCULAR_DEPS="true"

# Maximum dependency depth
MAX_DEPTH="20"

# ============================================================================
# LOGGING
# ============================================================================
# Log file path
LOG_FILE="/var/log/lpm.log"

# Log level: DEBUG, INFO, WARNING, ERROR
LOG_LEVEL="INFO"

# Keep logs for days (0 = forever)
LOG_RETENTION_DAYS="30"

# ============================================================================
# SECURITY
# ============================================================================
# Require root for installation
REQUIRE_ROOT="true"

# Sandbox builds (using bubblewrap)
USE_SANDBOX="false"

# Verify checksums before installation
VERIFY_CHECKSUMS="true"

# ============================================================================
# COLORS (for terminal output)
# ============================================================================
USE_COLORS="true"
COLOR_SUCCESS="\033[0;32m"
COLOR_ERROR="\033[0;31m"
COLOR_WARNING="\033[1;33m"
COLOR_INFO="\033[0;34m"
COLOR_RESET="\033[0m"