# LPM Configuration File
# Location: /etc/lpm/lpm.conf

[main]
# Package database location
database = /var/lib/lpm/packages.db

# Cache directory for downloaded packages
cache_dir = /var/cache/lpm

# Log directory
log_dir = /var/log/lpm

# Default build flags
default_cflags = "-O2 -pipe -march=native"
default_cxxflags = "-O2 -pipe -march=native"
default_make_jobs = 4

[repositories]
# Repository directories
repo_dirs = /etc/lpm/repos.d

# Auto-update repositories on install
auto_update_repos = true

[security]
# Require GPG signatures
require_signatures = false

# Trusted keys directory
trusted_keys = /etc/lpm/trusted.gpg

[build]
# Source directory for build
source_dir = /sources

# Keep build directories after install
keep_build_dirs = false

# Sandbox builds (use bubblewrap if available)
sandbox_builds = true