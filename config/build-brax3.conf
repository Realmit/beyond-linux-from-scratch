# ============================================================================
# CROSS-COMPILATION CONFIGURATION FOR BRAX3 (Qualcomm Snapdragon)
# ============================================================================

# Architecture cible
ARCH="aarch64"
TARGET_TRIPLET="aarch64-lfs-linux-gnu"

# Cross-compilation toolchain
CROSS_COMPILE="true"
CROSS_PREFIX="/usr/bin/aarch64-linux-gnu-"

# QEMU user emulation
QEMU_USER="qemu-aarch64-static"

# Sysroot
SYSROOT="/usr/aarch64-linux-gnu/sysroot"

# ============================================================================
# QUALCOMM SNAPDRAGON OPTIMISATIONS
# ============================================================================
# Snapdragon typically has:
# - Kryo CPU cores (ARMv8.2-A)
# - Adreno GPU
# - Hexagon DSP
# ============================================================================

CFLAGS="-O2 -pipe -march=armv8.2-a+crc+crypto+fp16+rcpc -mtune=cortex-a76"
CXXFLAGS="-O2 -pipe -march=armv8.2-a+crc+crypto+fp16+rcpc -mtune=cortex-a76"

# ============================================================================
# KERNEL CONFIGURATION
# ============================================================================
KERNEL_VERSION="6.12.20"
KERNEL_CONFIG="config/kernel-config-brax3"

# Kernel modules pour Brax3
KERNEL_MODULES=(
    "msm"              # Qualcomm SoC
    "qcom"             # Qualcomm drivers
    "adreno"           # GPU
    "q6dsp"            # Audio DSP
    "qmi"              # Modem interface
    "rmnet"            # Mobile data
    "msm_subsys"       # Subsystem management
    "qca6174"          # WiFi
    "qca9377"          # WiFi alternative
)

# ============================================================================
# BOOTLOADER
# ============================================================================
BOOTLOADER_TYPE="aboot"  # Qualcomm Android bootloader
BOOTLOADER_DEVICE="/dev/disk/by-partlabel/boot_a"
BOOTLOADER_CONFIG="config/bootloader-brax3.conf"

# ============================================================================
# MODEM CONFIGURATION
# ============================================================================
MODEM_TYPE="qcom_qmi"
MODEM_APN="internet"  # Change according to carrier
MODEM_INTERFACE="wwan0"

# ============================================================================
# INIT SYSTEM (systemd pour meilleure intégration mobile)
# ============================================================================
INIT_SYSTEM="systemd"
DEFAULT_TARGET="graphical.target"

# ============================================================================
# INPUT (touchscreen, buttons)
# ============================================================================
TOUCHSCREEN_DRIVER="goodix"
BUTTONS_DRIVER="gpio_keys"
PROXIMITY_SENSOR="stk3x1x"

# ============================================================================
# OUTPUT
# ============================================================================
OUTPUT_FORMAT="raw"  # Raw flash image
OUTPUT_NAME="brax3-lfs"