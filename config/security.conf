{
  "security": {
    "kernel_hardening": true,
    "firewall": {
      "enabled": true,
      "backend": "nftables",
      "allow_ssh": true,
      "allow_http": false,
      "allow_https": false,
      "rate_limit": 100,
      "log_dropped": true
    },
    "privacy": {
      "disable_telemetry": true,
      "clear_tmp_on_boot": true,
      "disable_core_dumps": true,
      "disable_history_for_root": true,
      "anonymize_logs": true
    },
    "fail2ban": {
      "enabled": true,
      "ban_time": 3600,
      "find_time": 600,
      "max_retry": 5,
      "services": ["sshd", "nginx", "apache"]
    },
    "audit": {
      "enabled": true,
      "monitor_files": ["/etc/passwd", "/etc/shadow", "/etc/sudoers"],
      "monitor_exec": true,
      "monitor_network": true
    },
    "apparmor": {
      "enabled": false,
      "enforce_profiles": ["sshd", "ping", "dhclient"]
    },
    "user_hardening": {
      "password_min_length": 12,
      "password_require_digit": true,
      "password_require_upper": true,
      "password_require_lower": true,
      "password_require_special": true,
      "login_delay_seconds": 4,
      "max_login_attempts": 5,
      "lockout_time_seconds": 1800,
      "disable_root_login": true,
      "inactive_days": 30,
      "umask": "027"
    },
    "encryption": {
      "encrypted_swap": true,
      "swap_size_mb": 2048,
      "full_disk_encryption": false,
      "luks_cipher": "aes-xts-plain64",
      "luks_key_size": 512
    },
    "hids": {
      "enabled": true,
      "tool": "aide",
      "daily_check": true,
      "email_alerts": true,
      "monitor_suid_changes": true
    },
    "privacy_tools": {
      "tor": false,
      "wireguard": true,
      "dnscrypt": true,
      "dns_servers": ["1.1.1.1", "9.9.9.9"],
      "block_tracking": true,
      "vpn_dns_leak_protection": true
    },
    "daily_scans": {
      "enabled": true,
      "rootkit_check": true,
      "virus_check": false,
      "port_scan": true,
      "suid_check": true,
      "world_writable_check": true,
      "report_email": "root"
    }
  },
  "compliance": {
    "gpg_signed_commits": true,
    "secure_boot": false,
    "measured_boot": false,
    "fips_140_2": false,
    "gdpr_compliant": true,
    "hipaa_compliant": false
  }
}