# ============================================================================
# SECURITY HARDENING CONFIGURATION
# For LFS/BLFS system security
# ============================================================================

# ============================================================================
# ACCOUNT SECURITY
# ============================================================================
# Minimum password length
PASSWORD_MIN_LEN="12"

# Password complexity (require mix of character types)
PASSWORD_COMPLEXITY="true"

# Maximum password age (days)
PASSWORD_MAX_AGE="90"

# Lock account after failed attempts
ACCOUNT_LOCK_THRESHOLD="5"

# Lock duration (seconds)
ACCOUNT_LOCK_DURATION="900"

# ============================================================================
# SSH HARDENING
# ============================================================================
# Disable root login over SSH
SSH_DISABLE_ROOT_LOGIN="true"

# Use key-based authentication only
SSH_KEY_ONLY="false"

# Change default SSH port
SSH_PORT="22"

# Allow SSH protocol 2 only
SSH_PROTOCOL="2"

# Maximum authentication attempts
SSH_MAX_AUTH_TRIES="3"

# Login grace time (seconds)
SSH_LOGIN_GRACE_TIME="30"

# ============================================================================
# FIREWALL
# ============================================================================
# Default firewall backend: iptables or nftables
FIREWALL_BACKEND="iptables"

# Default policy
FIREWALL_DEFAULT_INPUT="DROP"
FIREWALL_DEFAULT_OUTPUT="ACCEPT"
FIREWALL_DEFAULT_FORWARD="DROP"

# Allowed incoming ports (comma-separated)
FIREWALL_ALLOW_PORTS="22,80,443"

# Allowed incoming IP ranges
FIREWALL_ALLOW_IPS=""

# Rate limiting for SSH (connections per minute)
FIREWALL_SSH_RATE_LIMIT="4"

# ============================================================================
# FAIL2BAN CONFIGURATION
# ============================================================================
# Enable fail2ban service
FAIL2BAN_ENABLED="true"

# Banned time (seconds)
FAIL2BAN_BANTIME="3600"

# Find time (seconds) - time window for failures
FAIL2BAN_FINDTIME="600"

# Maximum retries before ban
FAIL2BAN_MAXRETRY="5"

# Jails to enable
FAIL2BAN_JAILS="ssh,sshd,dropbear,vsftpd,proftpd"

# ============================================================================
# AUDIT SYSTEM
# ============================================================================
# Enable Linux Audit daemon (auditd)
ENABLE_AUDITD="true"

# Audit rules: watch sensitive files
AUDIT_WATCH_ETC_PASSWD="true"
AUDIT_WATCH_ETC_SHADOW="true"
AUDIT_WATCH_ETC_SUDOERS="true"
AUDIT_WATCH_ETC_SSH="true"

# Audit log retention (days)
AUDIT_LOG_RETENTION="90"

# ============================================================================
# SYSTEM HARDENING
# ============================================================================
# Disable core dumps
DISABLE_CORE_DUMPS="true"

# Restrict kernel pointer access
RESTRICT_KERNEL_PTRACE="true"

# Disable USB storage (for servers)
DISABLE_USB_STORAGE="false"

# Disable Thunderbolt DMA attacks
DISABLE_THUNDERBOLT="true"

# Lock down systemd
SYSTEMD_LOCKDOWN="false"

# ============================================================================
# LOGGING
# ============================================================================
# Log retention (days)
LOG_RETENTION_DAYS="30"

# Remote logging (syslog server)
REMOTE_SYSLOG_SERVER=""
REMOTE_SYSLOG_PORT="514"

# Log critical events to console
LOG_CRIT_TO_CONSOLE="true"

# ============================================================================
# UPDATE SECURITY
# ============================================================================
# Automatic security updates
AUTO_SECURITY_UPDATES="true"

# Update check frequency (daily/weekly/monthly)
UPDATE_FREQUENCY="daily"

# Email on security updates
UPDATE_NOTIFY_EMAIL="root@localhost"

# ============================================================================
# MALWARE PROTECTION
# ============================================================================
# Enable rkhunter (rootkit hunter)
ENABLE_RKHUNTER="true"

# RKHunter scan frequency
RKHUNTER_FREQUENCY="weekly"

# Enable lynis auditing
ENABLE_LYNIS="true"

# Lynis scan frequency
LYNIS_FREQUENCY="weekly"

# ============================================================================
# FILE INTEGRITY MONITORING
# ============================================================================
# Enable AIDE (Advanced Intrusion Detection Environment)
ENABLE_AIDE="false"

# AIDE database location
AIDE_DB="/var/lib/aide/aide.db"
AIDE_DB_OUT="/var/lib/aide/aide.db.new"

# Files/directories to monitor
AIDE_MONITOR_DIRS="/etc,/usr/bin,/usr/sbin,/bin,/sbin,/boot"