# ============================================================================
# AUDIO PRODUCTION PROFILE CONFIGURATION
# Generated by select-audio-profile.sh on $(date)
# ============================================================================

# ============================================================================
# BASIC PROFILE SELECTION
# ============================================================================
# Available profiles:
#   - cli-minimal    : Terminal-only audio production (no X11/GUI)
#   - desktop-xfce   : Lightweight XFCE desktop audio workstation
#   - desktop-gnome  : Full-featured GNOME desktop audio workstation
#   - studio-full    : Complete professional audio workstation
#   - custom         : User-selected individual components
# ============================================================================
AUDIO_PROFILE="desktop-xfce"

# ============================================================================
# INIT SYSTEM (sysvinit or systemd)
# ============================================================================
# sysvinit : Traditional UNIX init (simpler, smaller, LFS classic)
# systemd  : Modern init (faster boot, better service management)
# ============================================================================
INIT_SYSTEM="sysvinit"

# ============================================================================
# REAL-TIME KERNEL (for low-latency audio)
# ============================================================================
# true  : Install and use real-time kernel with PREEMPT_RT patch
# false : Use standard kernel
# ============================================================================
RT_KERNEL="true"

# ============================================================================
# AUDIO SERVERS
# ============================================================================
# JACK2        : Professional low-latency audio server (required for DAWs)
# PIPEWIRE     : Modern audio server (replaces JACK + PulseAudio)
# PULSEAUDIO   : Legacy audio server (not recommended for pro audio)
# ============================================================================
JACK2_ENABLED="true"
PIPEWIRE_ENABLED="false"
PULSEAUDIO_ENABLED="false"

# ============================================================================
# GRAPHICAL INTERFACE (auto-detected from profile)
# ============================================================================
# true  : Install X11/Wayland and desktop environment
# false : Headless/CLI only
# ============================================================================
GUI_ENABLED="true"

# ============================================================================
# DESKTOP ENVIRONMENT (if GUI_ENABLED=true)
# ============================================================================
# Options: xfce, gnome, kde, none
# ============================================================================
DESKTOP_ENVIRONMENT="xfce"

# ============================================================================
# DIGITAL AUDIO WORKSTATIONS (DAWs)
# ============================================================================
# All options: true/false
# ============================================================================
INSTALL_ARDOUR="true"          # Professional DAW (multi-track recording)
INSTALL_LMMS="true"            # Music production suite (FL Studio alternative)
INSTALL_QTractor="false"       # MIDI/Audio sequencer
INSTALL_ROSEGARDEN="false"     # MIDI sequencer + notation editor
INSTALL_ZRYTHM="false"         # Modern DAW (in active development)
INSTALL_MUSIKCUBE="false"      # Terminal-based music player/organizer

# ============================================================================
# AUDIO EDITORS
# ============================================================================
INSTALL_AUDACITY="true"        # Audio editor and recorder
INSTALL_SND="false"            # Advanced audio editor (Emacs-like)
INSTALL_OCENAUDIO="false"      # Cross-platform audio editor

# ============================================================================
# MIDI TOOLS
# ============================================================================
INSTALL_FLUIDSYNTH="true"      # Software synthesizer (SoundFont player)
INSTALL_TIMIDITY="true"        # MIDI to WAVE converter
INSTALL_WILDMIDI="false"       # Lightweight MIDI player
INSTALL_LINUXSAMPLER="false"   # Professional sampler
INSTALL_SFIZZ="false"          # SFZ sampler implementation
INSTALL_MIDISH="false"         # MIDI shell/sequencer

# ============================================================================
# PLUGIN COLLECTIONS
# ============================================================================
INSTALL_CALF_PLUGINS="true"    # Calf Studio Gear (compressor, EQ, reverb)
INSTALL_LSP_PLUGINS="true"     # Linux Studio Projects (professional plugins)
INSTALL_DRAGONFLY_REVERB="true" # High-quality reverb
INSTALL_X42_PLUGINS="false"    # x42 series (metering, limiting)
INSTALL_ZAM_PLUGINS="false"    # ZAM audio plugins
INSTALL_SWH_PLUGINS="true"     # Steve Harris plugins (classic)
INSTALL_TAP_PLUGINS="false"    # Tom's Audio Processing plugins
INSTALL_GUITARIX="false"       # Guitar amplifier simulation

# ============================================================================
# SOUNDFONTS & SAMPLE LIBRARIES
# ============================================================================
# Options: none, minimal, medium, full
# ============================================================================
SOUNDFONTS_LEVEL="medium"

# Specific soundfonts (if SOUNDFONTS_LEVEL != none)
INSTALL_FLUID_GM="true"        # FluidR3 General MIDI soundfont
INSTALL_FLUID_GS="false"       # FluidR3 GS soundfont
INSTALL_FREEPATS="true"        # TiMidity++ free patches
INSTALL_ARACHNO="false"        # Arachno SoundFont
INSTALL_SALAMANDER_PIANO="false" # Salamander Grand Piano
INSTALL_DRUMGIZMO="false"      # Drum sample libraries

# ============================================================================
# AUDIO ANALYSIS & METERING
# ============================================================================
INSTALL_AUBIO="false"          # Audio analysis tools (onset detection, pitch)
INSTALL_VAMP_PLUGINS="false"   # Vamp analysis plugins
INSTALL_SPEK="false"           # Spectrogram generator
INSTALL_BAUDLINE="false"       # Real-time spectrum analyzer
INSTALL_JKMETER="true"         # K-system metering
INSTALL_JNOISEMETER="false"    # Audio drift measurement

# ============================================================================
# NETWORK AUDIO
# ============================================================================
INSTALL_JACKTRIP="false"       # Low-latency multi-machine audio
INSTALL_SONOBUS="false"        # Network audio collaboration
INSTALL_ZITA_NJBRIDGE="false"  # Jack multi-channel streaming

# ============================================================================
# BATCH PROCESSING & CONVERSION
# ============================================================================
INSTALL_FFMPEG="true"          # Audio/video conversion
INSTALL_SOX="true"             # Swiss Army knife of audio processing
INSTALL_ECASOUND="false"       # Multitrack audio processor
INSTALL_SHNTOOL="false"        # WAVE/audio file manipulator
INSTALL_MP3GAIN="false"        # MP3 volume normalization
INSTALL_NORMALIZE="false"      # Audio file normalization

# ============================================================================
# CD RIPPING & METADATA
# ============================================================================
INSTALL_CDPARANOIA="false"     # CD ripper with error correction
INSTALL_ABCDE="false"          # CLI CD ripper and encoder
INSTALL_EASYTag="false"        # GTK metadata editor
INSTALL_ID3V2="false"          # CLI ID3 tag editor
INSTALL_METAFLAC="false"       # FLAC metadata editor
INSTALL_EXIFTOOL="false"       # Metadata reader/editor

# ============================================================================
# WEB BROWSERS (for documentation, tutorials, online resources)
# ============================================================================
# Options: none, firefox, brave, chromium, lynx
# ============================================================================
INSTALL_BROWSER="firefox"      # Browser for audio production documentation

# ============================================================================
# EMAIL CLIENTS (for collaboration, feedback, client communication)
# ============================================================================
# Options: none, thunderbird, claws, mutt, neomutt
# ============================================================================
INSTALL_EMAIL="none"           # Email client (none for minimal production)

# ============================================================================
# DEVELOPMENT TOOLS (for building audio plugins)
# ============================================================================
INSTALL_AUDIO_DEV="false"      # Audio development libraries (lv2-dev, jack-dev)
INSTALL_FAUST="false"          # Functional audio stream language
INSTALL_CSOUND="false"         # Csound synthesis language
INSTALL_SUPERCOLLIDER="false"  # Real-time audio synthesis
INSTALL_PURE_DATA="false"      # Visual programming for audio

# ============================================================================
# LIVE PERFORMANCE TOOLS
# ============================================================================
INSTALL_GIADA="false"          # Live looping and sampling
INSTALL_HYDROGEN="false"       # Drum machine
INSTALL_VMPK="false"           # Virtual MIDI piano keyboard
INSTALL_JACK_KEYBOARD="false"  # Virtual MIDI keyboard

# ============================================================================
# SYSTEM PERFORMANCE TUNING
# ============================================================================
# CPU governor for audio production
# Options: performance, conservative, ondemand, powersave
# ============================================================================
CPU_GOVERNOR="performance"

# Disable suspend/sleep during recording
DISABLE_SUSPEND="true"

# Increase real-time priority for audio processes
RT_PRIORITY="95"

# Lock memory for audio processing (prevents swapping)
MEMLOCK_UNLIMITED="true"

# ============================================================================
# SAMPLE RATE & BUFFER SETTINGS (JACK/PipeWire)
# ============================================================================
# Sample rate in Hz (44100, 48000, 96000, 192000)
SAMPLE_RATE="48000"

# Buffer size in frames (64, 128, 256, 512, 1024)
# Lower = less latency, higher = more stability
BUFFER_SIZE="128"

# Number of periods (2-3 recommended)
PERIODS="2"

# ============================================================================
# NETWORK SETTINGS (for audio collaboration)
# ============================================================================
# Enable network audio discovery (Avahi/Bonjour)
ENABLE_NETWORK_AUDIO="false"

# Firewall rules for audio collaboration
AUDIO_FIREWALL_PORTS="22,9988,9999,4444,4445"

# ============================================================================
# LOGGING & DEBUGGING
# ============================================================================
# Enable verbose audio logs (for troubleshooting)
AUDIO_DEBUG_LOG="false"

# Keep build artifacts for debugging
KEEP_BUILD_ARTIFACTS="false"

# ============================================================================
# CUSTOM PACKAGE LISTS (for advanced users)
# ============================================================================
# Additional packages to install (space-separated)
# Example: CUSTOM_PACKAGES="jamin whysynth phasex"
CUSTOM_PACKAGES=""

# Packages to exclude (space-separated)
# Example: EXCLUDE_PACKAGES="calf-plugins swh-plugins"
EXCLUDE_PACKAGES=""

# ============================================================================
# END OF CONFIGURATION
# ============================================================================