# ============================================================================
# CROSS-COMPILATION CONFIGURATION FOR PINEBOOK (ARM64 / RK3399)
# ============================================================================

# Architecture cible
ARCH="aarch64"
TARGET_TRIPLET="aarch64-lfs-linux-gnu"

# Cross-compilation toolchain
CROSS_COMPILE="true"
CROSS_PREFIX="/usr/bin/aarch64-linux-gnu-"

# QEMU user emulation
QEMU_USER="qemu-aarch64-static"

# Sysroot
SYSROOT="/usr/aarch64-linux-gnu/sysroot"

# ============================================================================
# PROCESSOR OPTIMISATIONS (RK3399)
# ============================================================================
# RK3399 has:
# - 2x Cortex-A72 (big cores)
# - 4x Cortex-A53 (little cores)
# - Mali T860 MP4 GPU
# ============================================================================

CFLAGS="-O2 -pipe -march=armv8-a+crc+crypto -mtune=cortex-a72"
CXXFLAGS="-O2 -pipe -march=armv8-a+crc+crypto -mtune=cortex-a72"

# Optimisations pour big.LITTLE
HMP_OPTIMIZATIONS="true"

# ============================================================================
# KERNEL CONFIGURATION
# ============================================================================
KERNEL_VERSION="6.12.20"
KERNEL_CONFIG="config/kernel-config-pinebook"

# Kernel modules pour Pinebook
KERNEL_MODULES=(
    "rk3399"           # SoC support
    "panfrost"         # Mali GPU
    "brcmfmac"         # WiFi AP6256
    "es8316"           # Audio codec
    "crypto_engine"    # Hardware crypto
    "rockchip_saradc"  # ADC
    "dw_hdmi"          # HDMI
    "analogix_dp"      # DisplayPort
)

# ============================================================================
# BOOTLOADER
# ============================================================================
BOOTLOADER_TYPE="uboot"
UBOOT_BOARD="pinebook-pro-rk3399_defconfig"
UBOOT_CONFIG="config/u-boot-pinebook.config"

# ============================================================================
# INIT SYSTEM (sysvinit pour légèreté)
# ============================================================================
INIT_SYSTEM="sysvinit"
DEFAULT_RUNLEVEL="5"  # GUI par défaut

# ============================================================================
# LIVRE SYSTEM (désactivé pour économiser l'espace)
# ============================================================================
LIVE_SYSTEM_ENABLED="false"

# ============================================================================
# OUTPUT
# ============================================================================
OUTPUT_FORMAT="image"  # SD card image
IMAGE_SIZE_MB="8192"   # 8GB minimum pour Pinebook