# Init System Configuration for LFS
# ============================================================================

# Available init systems:
#   systemd    - Modern init with service management (default)
#   sysv       - Traditional SysV init scripts
#   openrc     - Dependency-based init (Gentoo style)
#   runit      - Simple service supervision
#   s6         - Small supervision suite

INIT_SYSTEM="systemd"  # Options: systemd, sysv, openrc, runit, s6

# Service management style
#   classic    - manual rc scripts
#   supervision - automatic service monitoring (runit/s6)

SERVICE_STYLE="classic"

# Enable automatic service restart
AUTO_RESTART_ENABLED="true"

# Service timeout (seconds)
SERVICE_TIMEOUT="5"

# Enable parallel service startup
PARALLEL_STARTUP="true"

# Maximum parallel startups
MAX_PARALLEL_STARTUPS="4"