# ============================================================================
# INIT SYSTEM CONFIGURATION
# Generated by init-selector.sh or select-audio-profile.sh
# ============================================================================

# ============================================================================
# INIT SYSTEM SELECTION
# ============================================================================
# Options: sysvinit, systemd, openrc, runit, s6
#
# sysvinit : Traditional UNIX init (LFS classic, simple, small ~500KB)
# systemd  : Modern init (parallel boot, service management, ~10MB)
# openrc   : Gentoo-style dependency-based init (~2MB)
# runit    : Simple supervision suite (~300KB)
# s6       : Small supervision suite (security-focused)
# ============================================================================
INIT_SYSTEM="sysvinit"

# ============================================================================
# SYSVINIT SETTINGS (if INIT_SYSTEM=sysvinit)
# ============================================================================
# Boot script style
# Options: lfs-classic (original LFS), bsd-style (/etc/rc.d structure)
SYSVINIT_STYLE="lfs-classic"

# Default runlevel
# 1: single-user, 2: multi-user (no network), 3: full multi-user, 5: X11
DEFAULT_RUNLEVEL="3"

# Enable sulogin on boot failures (allows root login for recovery)
ENABLE_SULOGIN="true"

# ============================================================================
# SYSTEMD SETTINGS (if INIT_SYSTEM=systemd)
# ============================================================================
# Enable systemd-networkd (instead of NetworkManager)
USE_SYSTEMD_NETWORKD="false"

# Enable systemd-resolved (DNS resolver)
USE_SYSTEMD_RESOLVED="true"

# Default target
# Options: multi-user.target, graphical.target
SYSTEMD_DEFAULT_TARGET="multi-user.target"

# Enable systemd-timesyncd (NTP client)
USE_SYSTEMD_TIMESYNCD="true"

# Enable systemd-journald persistent logging
JOURNALD_PERSISTENT="true"

# Maximum journal size
JOURNALD_MAX_SIZE="500M"

# ============================================================================
# OPENRC SETTINGS (if INIT_SYSTEM=openrc)
# ============================================================================
# Enable parallel startup (faster boot)
OPENRC_PARALLEL="true"

# Enable logging
OPENRC_LOGGER="true"

# ============================================================================
# RUNIT SETTINGS (if INIT_SYSTEM=runit)
# ============================================================================
# Service directory
RUNIT_SERVICE_DIR="/etc/runit/runsvdir/default"

# Enable getty on all consoles
RUNIT_GETTY_ALL="false"

# ============================================================================
# S6 SETTINGS (if INIT_SYSTEM=s6)
# ============================================================================
# Service database directory
S6_SERVICE_DIR="/etc/s6/servicedb"

# Scan interval (seconds)
S6_SCAN_INTERVAL="5"

# ============================================================================
# COMMON SETTINGS (all init systems)
# ============================================================================
# Enable automatic service supervision (for runit/s6)
SERVICE_STYLE="supervision"

# Enable core services
ENABLE_SSH="true"
ENABLE_CRON="true"
ENABLE_SYSLOG="true"
ENABLE_DBUS="true"