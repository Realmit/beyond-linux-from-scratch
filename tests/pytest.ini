[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=builder
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    -p no:cacheprovider
markers =
    unit: Unit tests (rapides, sans dépendances externes)
    integration: Tests d'intégration (nécessitent réseau)
    network: Tests réseau (téléchargements réels)
    usb: Tests USB (nécessitent matériel, destructifs)
    dangerous: Tests dangereux (peuvent endommager le système)
    slow: Tests lents
    acceptance: Tests d'acceptance (scripts shell réels)
    chroot: Tests nécessitant chroot (sudo)
filterwarnings =
    ignore:.*cannot collect test class.*:pytest.PytestCollectionWarning
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
timeout = 300
timeout_method = thread