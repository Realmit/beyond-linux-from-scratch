[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=builder
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    -p no:cacheprovider
markers =
    unit: Unit tests
    integration: Integration tests
    network: Network tests (real downloads)
    usb: USB tests (simulated, no hardware needed)
    dangerous: Dangerous tests
    slow: Slow tests
    acceptance: Acceptance tests
    timeout: Test execution timeout in seconds.
filterwarnings =
    ignore:.*cannot collect test class.*:pytest.PytestCollectionWarning
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
timeout = 300
timeout_method = thread