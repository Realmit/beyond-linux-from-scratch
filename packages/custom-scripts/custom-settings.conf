# Configuration personnalisée pour LFS Linux
# Ce fichier est sourcé par theme-setup.sh et first-boot.sh

# Thème
THEME_NAME="Arc-Dark"
ICON_THEME="Papirus"
FONT_NAME="Noto Sans 10"

# Bureau
DESKTOP_TYPE="xfce"  # xfce, gnome, kde, lxqt

# Utilisateur par défaut
DEFAULT_USER="lfsuser"
DEFAULT_PASSWORD="lfsuser123"

# Hostname
HOSTNAME="lfs-desktop"

# Options de persistance
PERSISTENCE_LABEL="LFS-PERSIST"
PERSISTENCE_SIZE=2048  # MB

# Activer/désactiver des fonctionnalités
ENABLE_BLUETOOTH=true
ENABLE_PRINTING=false
ENABLE_AUTO_LOGIN=false